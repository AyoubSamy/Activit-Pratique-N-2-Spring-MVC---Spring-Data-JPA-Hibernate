<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="layout1"
>
<head>
    <meta charset="UTF-8">
    <title>products</title>
    <link rel="stylesheet"  type="text/css" href="/webjars/bootstrap/5.1.3/css/bootstrap.min.css">
    <script src="/webjars/bootstrap/5.1.3/js/bootstrap.bundle.js"></script>
</head>
<body>

 <div class="p-3" layout:fragment="content">
     <div sec:authorize="hasRole('ADMIN')">
        <a class="btn btn-dark" th:href="@{/admin/newProduct}">New Product</a>
     </div>
   <table class="table">
       <thead>
            <th>ID</th><th>Name</th><th>Price</th><th>Quantite</th>
       </thead>
       <tbody>
            <tr th:each="p:${productList}">
                <td th:text = "${p.id_product}"></td>
                <td th:text = "${p.name}"></td>
                <td th:text = "${p.price}"></td>
                <td th:text = "${p.quantite}"></td>
                <td sec:authorize="hasRole('ADMIN')">
                    <form method="post" th:action="@{/admin/delete(id=${p.id_product})}">
                         <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
       </tbody>
   </table>
 </div>
</body>
</html>
