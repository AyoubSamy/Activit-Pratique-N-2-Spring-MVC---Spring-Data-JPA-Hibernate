<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>products</title>
    <link rel="stylesheet"  type="text/css" href="/webjars/bootstrap/5.1.3/css/bootstrap.min.css">
</head>
<body>
 <div class="p-3">
   <table class="table">
       <thead>
            <th>ID</th><th>Name</th><th>Price</th><th>Quantite</th>
       </thead>
       <tbody>
            <tr th:each="p:${productList}">
                <td th:text = "${p.id_product}"></td>
                <td th:text = "${p.name_product}"></td>
                <td th:text = "${p.price}"></td>
                <td th:text = "${p.quantite}"></td>
                <td>
                    <a class="btn btn-danger" onclick="return confirm('Etes vous sure ?')" th:href="@{/delete(id=${p.id_product})}">Delete</a>
                </td>

            </tr>
       </tbody>
   </table>
 </div>
</body>
</html>
