<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
>
<head>
    <meta charset="UTF-8">
    <title>products</title>
    <link rel="stylesheet"  type="text/css" href="/webjars/bootstrap/5.1.3/css/bootstrap.min.css">
    <script src="/webjars/bootstrap/5.1.3/js/bootstrap.bundle.js"></script>
</head>
<body>

 <div class="p-3" layout:fragment="content">
     <form method="post" th:action="@{/admin/saveProduct}">
         <div class="mb-3">
             <label class="form-label">Name</label>
             <input class="form-control" type="text" name="name" th:value="${product.name}" >
             <span class="text-danger" th:errors="${product.name}"></span>
         </div>

         <div class="mb-3">
             <label class="form-label">Price</label>
             <input class="form-control" type="text" name="price" th:value="${product.price}" >
             <span class="text-danger" th:errors="${product.price}"></span>
         </div>

         <div class="mb-3">
             <label class="form-label">Quantite</label>
             <input class="form-control" type="text" name="quantite" th:value="${product.quantite}" >
             <span class="text-danger" th:errors="${product.quantite}"></span>
         </div>

         <button type="submit" class="btn btn-dark">Save</button>

     </form>
 </div>
</body>
</html>
